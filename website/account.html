<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your account — FOUND</title>

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#000000">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f6f3;
      color: #111111;
    }
    .serif { font-family: Georgia, "Times New Roman", serif; }
    .grain {
      background-image:
        radial-gradient(circle at 20% 20%, rgba(0,0,0,0.035) 0, transparent 24%),
        radial-gradient(circle at 80% 0%, rgba(122,132,106,0.18) 0, transparent 28%),
        radial-gradient(circle at 50% 90%, rgba(217,204,189,0.35) 0, transparent 32%);
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">

<header class="bg-[#f8f6f3]/85 backdrop-blur border-b border-black/5">
  <div class="max-w-7xl mx-auto px-5 md:px-8 h-20 flex items-center justify-between">
    <a href="/" class="flex items-center gap-3">
      <svg width="36" height="36" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="FOUND Logo">
        <circle cx="20" cy="20" r="20" fill="#111111"/>
        <circle cx="20" cy="20" r="17" fill="#ffffff"/>
        <rect x="11" y="8" width="5" height="23" rx="2" fill="#111111"/>
        <rect x="11" y="8" width="14" height="5" rx="2" fill="#111111"/>
        <rect x="11" y="17.5" width="10.5" height="4.5" rx="2" fill="#111111"/>
        <circle cx="27" cy="29.5" r="3" fill="#111111"/>
      </svg>
      <span class="text-2xl tracking-tight font-semibold">FOUND</span>
    </a>
    <button id="signOutBtn" type="button"
            class="text-sm text-neutral-600 hover:text-black">Sign out</button>
  </div>
</header>

<main class="grain flex-1 flex items-center justify-center px-5 md:px-8 py-16">
  <div class="w-full max-w-xl">
    <!-- Loading state -->
    <div id="loadingState" class="text-center text-neutral-500">Loading…</div>

    <!-- Authenticated state -->
    <div id="accountCard" class="hidden bg-white border border-black/10 rounded-3xl shadow-sm p-8 md:p-10">
      <div class="flex items-center gap-4 mb-7">
        <div class="w-16 h-16 rounded-full bg-black text-white flex items-center justify-center text-2xl font-medium">
          <span id="avatarInitials">··</span>
        </div>
        <div>
          <h1 class="serif text-3xl tracking-tight" id="welcomeName">Welcome.</h1>
          <p class="text-neutral-500 text-sm" id="userEmail"></p>
        </div>
      </div>

      <div class="space-y-3 mb-7">
        <div class="flex items-center justify-between p-4 bg-[#f8f6f3] rounded-xl border border-black/5">
          <div>
            <p class="text-sm text-neutral-500">Onboarding</p>
            <p id="onboardingStatus" class="font-medium">Checking…</p>
          </div>
          <span id="onboardingBadge"
                class="text-xs uppercase tracking-wider px-3 py-1 rounded-full bg-neutral-100 text-neutral-600">—</span>
        </div>
      </div>

      <div class="space-y-3">
        <button type="button" id="openAppBtn"
           class="block w-full rounded-full bg-black text-white py-4 text-center text-base font-medium hover:opacity-90 transition disabled:opacity-50">
          Open the FOUND app
        </button>
        <a href="/"
           class="block w-full rounded-full bg-white border border-black/10 py-4 text-center text-base font-medium hover:bg-[#efe9e1] transition">
          Back to home
        </a>
      </div>

      <p class="text-xs text-neutral-500 text-center mt-6">
        Tap "Open the FOUND app" to sign in automatically — no need to retype your password. TestFlight invite for the native iOS app coming soon.
      </p>
    </div>

    <!-- Not-signed-in fallback -->
    <div id="signedOutCard" class="hidden bg-white border border-black/10 rounded-3xl shadow-sm p-8 md:p-10 text-center">
      <h1 class="serif text-3xl tracking-tight mb-3">You're signed out.</h1>
      <p class="text-neutral-600 mb-6">Sign in to access your FOUND account.</p>
      <a href="/login.html"
         class="inline-block rounded-full bg-black text-white px-8 py-4 text-base font-medium hover:opacity-90 transition">
        Sign in
      </a>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/assets/auth.js"></script>
<script>
  const loadingEl    = document.getElementById('loadingState');
  const accountCard  = document.getElementById('accountCard');
  const signedOutCard = document.getElementById('signedOutCard');
  const initialsEl   = document.getElementById('avatarInitials');
  const welcomeEl    = document.getElementById('welcomeName');
  const emailEl      = document.getElementById('userEmail');
  const statusEl     = document.getElementById('onboardingStatus');
  const badgeEl      = document.getElementById('onboardingBadge');
  const signOutBtn   = document.getElementById('signOutBtn');

  (async () => {
    const session = await foundAuth.getSession();
    loadingEl.classList.add('hidden');

    if (!session) {
      signedOutCard.classList.remove('hidden');
      return;
    }

    const fullName = session.user?.user_metadata?.full_name || '';
    const email    = session.user?.email || '';

    initialsEl.textContent = foundAuth.initialsFrom(fullName, email);
    welcomeEl.textContent  = fullName ? `Welcome, ${fullName.split(' ')[0]}.` : 'Welcome.';
    emailEl.textContent    = email;

    // Try to read onboarding status — relies on RLS allowing user to read own profile
    const { data: profile, error } = await window._supabase
      .from('profiles')
      .select('onboarding_complete')
      .eq('id', session.user.id)
      .maybeSingle();

    if (error || !profile) {
      statusEl.textContent  = 'Not started';
      badgeEl.textContent   = 'Pending';
      badgeEl.className     = 'text-xs uppercase tracking-wider px-3 py-1 rounded-full bg-neutral-100 text-neutral-600';
    } else if (profile.onboarding_complete) {
      statusEl.textContent  = 'Complete — your matches are ready';
      badgeEl.textContent   = 'Done';
      badgeEl.className     = 'text-xs uppercase tracking-wider px-3 py-1 rounded-full bg-[#7a846a]/15 text-[#5a6450]';
    } else {
      statusEl.textContent  = 'In progress — finish in the app';
      badgeEl.textContent   = 'Pending';
      badgeEl.className     = 'text-xs uppercase tracking-wider px-3 py-1 rounded-full bg-neutral-100 text-neutral-600';
    }

    accountCard.classList.remove('hidden');
  })();

  signOutBtn.addEventListener('click', async () => {
    await foundAuth.signOut();
    window.location.replace('/');
  });

  // ── Open the FOUND app with session handoff ───────────────────────
  // The app lives on a different origin (Vercel) than this site (Netlify),
  // so localStorage isn't shared. We pass the current Supabase session via
  // URL hash — the app's Supabase client has `detectSessionInUrl: true`,
  // so it picks up the tokens and signs the user in automatically.
  // (Same mechanism Supabase magic links use.)
  const APP_URL    = 'https://found-community.vercel.app/';
  const openAppBtn = document.getElementById('openAppBtn');

  openAppBtn.addEventListener('click', async () => {
    openAppBtn.disabled = true;
    openAppBtn.textContent = 'Opening…';
    try {
      const { data, error } = await window._supabase.auth.getSession();
      if (error || !data?.session) {
        // Not signed in for some reason — just send them to the app's sign-in.
        window.location.href = APP_URL;
        return;
      }
      const { access_token, refresh_token, expires_in, token_type } = data.session;
      const params = new URLSearchParams({
        access_token,
        refresh_token,
        token_type: token_type || 'bearer',
        expires_in: String(expires_in ?? 3600),
        type: 'magiclink',
      });
      // Hash, not query — Supabase detects tokens in the URL fragment.
      window.location.href = `${APP_URL}#${params.toString()}`;
    } catch (e) {
      console.warn('[openApp] handoff failed', e);
      window.location.href = APP_URL;
    }
  });
</script>

</body>
</html>
